name: Multi-Site Deployment

on:
  push:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      site_id:
        description: 'Specific site ID to deploy (leave empty for all)'
        required: false
        type: string
  repository_dispatch:
    types: [site_deployment_request, site_created]

jobs:
  fetch-configs:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Fetch configurations from Appwrite
        id: set-matrix
        run: |
          SPECIFIC_SITE_ID="${{ github.event.client_payload.site_id || inputs.site_id || '' }}"

          if [ -n "$SPECIFIC_SITE_ID" ]; then
            echo "🎯 Deploying specific site: $SPECIFIC_SITE_ID"
            CONFIGS=$(curl -s -X GET \
              "https://fra.cloud.appwrite.io/v1/databases/${{ secrets.APPWRITE_DATABASE_ID }}/collections/deployment_configs/documents/$SPECIFIC_SITE_ID" \
              -H "X-Appwrite-Project: ${{ secrets.APPWRITE_PROJECT_ID }}" \
              -H "X-Appwrite-Key: ${{ secrets.APPWRITE_API_KEY }}" \
              -H "Content-Type: application/json")

            if ! echo "$CONFIGS" | jq empty 2>/dev/null; then
              echo "❌ Invalid JSON response"
              echo "matrix={\"include\":[]}" >> $GITHUB_OUTPUT
              exit 0
            fi

            MATRIX=$(echo "$CONFIGS" | jq -c '{
              include: [{
                siteId: (.["$id"] // .siteId // "unknown"),
                siteName: (.siteName // "Unnamed Site"),
                appId: (.appId // "120839"),
                primaryColor: (.primaryColor // "#ff444f"),
                secondaryColor: (.secondaryColor // "#85acb0"),
                domain: (.domain // "")
              }]
            }')
          else
            echo "🌍 Deploying all sites"
            CONFIGS=$(curl -s -X GET \
              "https://fra.cloud.appwrite.io/v1/databases/${{ secrets.APPWRITE_DATABASE_ID }}/collections/deployment_configs/documents" \
              -H "X-Appwrite-Project: ${{ secrets.APPWRITE_PROJECT_ID }}" \
              -H "X-Appwrite-Key: ${{ secrets.APPWRITE_API_KEY }}" \
              -H "Content-Type: application/json")

            if ! echo "$CONFIGS" | jq empty 2>/dev/null; then
              echo "❌ Invalid JSON response"
              echo "matrix={\"include\":[]}" >> $GITHUB_OUTPUT
              exit 0
            fi

            DOC_COUNT=$(echo "$CONFIGS" | jq -r '.documents // [] | length')
            if [ "$DOC_COUNT" -eq "0" ]; then
              echo "⚠️ No site configurations found"
              echo "matrix={\"include\":[]}" >> $GITHUB_OUTPUT
              exit 0
            fi

            MATRIX=$(echo "$CONFIGS" | jq -c '
              {
                include: [
                  (.documents // [])[] | {
                    siteId: (.siteId // "unknown"),
                    siteName: (.siteName // "Unnamed Site"),
                    appId: (.appId // "120839"),
                    primaryColor: (.primaryColor // "#ff444f"),
                    secondaryColor: (.secondaryColor // "#85acb0"),
                    domain: (.domain // "")
                  }
                ]
              }
            ')
          fi

          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

  build-and-deploy:
    needs: fetch-configs
    runs-on: ubuntu-latest
    if: needs.fetch-configs.outputs.matrix != '{"include":[]}' && needs.fetch-configs.outputs.matrix != ''
    strategy:
      matrix: ${{fromJson(needs.fetch-configs.outputs.matrix)}}
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.1.1

      - name: Setup Node.js
        uses: actions/setup-node@v4.0.2
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache build output
        uses: actions/cache@v4
        with:
          path: dist
          key: ${{ runner.os }}-build-${{ github.sha }}

      - name: Build site - ${{ matrix.siteName }}
        env:
          APP_ID: ${{ matrix.appId }}
          PRIMARY_COLOR: ${{ matrix.primaryColor }}
          SECONDARY_COLOR: ${{ matrix.secondaryColor }}
          SITE_NAME: ${{ matrix.siteName }}
          DOMAIN: ${{ matrix.domain }}
        run: npm run build

      - name: Trigger Appwrite Deployment - ${{ matrix.siteName }}
        run: |
          echo "🚀 Deploying ${{ matrix.siteName }}..."
          if [ ! -d "dist" ]; then
            echo "❌ dist directory missing!"
            exit 1
          fi
          zip -r site-build.zip dist -q
          DEPLOY_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://fra.cloud.appwrite.io/v1/sites/${{ matrix.siteId }}/deployments" \
            -H "X-Appwrite-Project: ${{ secrets.APPWRITE_PROJECT_ID }}" \
            -H "X-Appwrite-Key: ${{ secrets.APPWRITE_API_KEY }}" \
            -F "entrypoint=index.html" \
            -F "code=@site-build.zip")
          HTTP_CODE=$(echo "$DEPLOY_RESPONSE" | tail -n1)
          if [ "$HTTP_CODE" -ne "200" ] && [ "$HTTP_CODE" -ne "201" ]; then
            echo "❌ Deployment failed with HTTP $HTTP_CODE"
            exit 1
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4.3.1
        with:
          name: site-${{ matrix.siteId }}
          path: dist/
          retention-days: 7

  notify-completion:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Deployment Summary
        run: |
          echo "🎉 Multi-site deployment completed!"
          echo "Check the artifacts for each site build"
