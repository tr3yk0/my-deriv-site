name: Build staging and Deploy to Cloudflare Pages

on:
  push:
    branches:
      - 'master'

concurrency:
  group: cloudflare-pages-build-staging
  cancel-in-progress: true

jobs:
  build_to_cloudflare_pages:
    name: Build and deploy to Cloudflare Pages (staging)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: staging
    permissions:
      contents: read

    outputs:
      preview_url: ${{ steps.publish-to-pages.outputs.preview_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js 20
        uses: actions/setup-node@v3
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Restore node_modules cache
        id: cache-npm
        uses: actions/cache@v4
        with:
          path: node_modules
          key: npm-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: Install dependencies
        if: ${{ steps.cache-npm.outputs.cache-hit != 'true' }}
        run: npm ci
        shell: bash

      - name: Build staging
        run: npm run build
        env:
          APP_ENV: staging
          R2_PROJECT_NAME: ${{ vars.R2_PROJECT_NAME }}
          TRANSLATIONS_CDN_URL: ${{ vars.TRANSLATIONS_CDN_URL }}
          CROWDIN_BRANCH_NAME: staging
          IS_GROWTHBOOK_ENABLED: ${{ vars.IS_GROWTHBOOK_ENABLED }}
          RUDDERSTACK_KEY: ${{ vars.RUDDERSTACK_KEY }}
          REMOTE_CONFIG_URL: ${{ vars.REMOTE_CONFIG_URL }}
          GROWTHBOOK_CLIENT_KEY: ${{ vars.GROWTHBOOK_CLIENT_KEY }}
          GROWTHBOOK_DECRYPTION_KEY: ${{ vars.GROWTHBOOK_DECRYPTION_KEY }}
          GD_API_KEY: ${{ secrets.GD_API_KEY }}
          GD_APP_ID: ${{ secrets.GD_APP_ID }}
          GD_CLIENT_ID: ${{ secrets.GD_CLIENT_ID }}
          DATADOG_APPLICATION_ID: ${{ secrets.DATADOG_APPLICATION_ID }}
          DATADOG_CLIENT_TOKEN: ${{ secrets.DATADOG_CLIENT_TOKEN }}
          DATADOG_SESSION_REPLAY_SAMPLE_RATE: ${{ vars.DATADOG_SESSION_REPLAY_SAMPLE_RATE }}
          DATADOG_SESSION_SAMPLE_RATE: ${{ vars.DATADOG_SESSION_SAMPLE_RATE }}
          REF_NAME: ${{ github.ref_name }}

      - name: Run ESLint
        run: npm run test:lint

      - name: Run unit tests and coverage
        run: npm run test

      - name: Archive build artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dist-build
          path: dist/
          retention-days: 7

      - name: Install Wrangler CLI
        run: |
          echo "Installing Wrangler CLI"
          npm i -g wrangler@3
        shell: bash

      - name: Publish to Cloudflare Pages
        id: publish-to-pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PROJECT_NAME: ${{ vars.CLOUDFLARE_PROJECT_NAME }}
          HEAD_BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          echo "Deploying build to Cloudflare Pages (wrangler pages deploy)"
          directory='dist/'
          projectName="${CLOUDFLARE_PROJECT_NAME:-}"
          # Use the pushed branch name (github.ref_name). Sanitize for pages branch naming.
          raw_branch="${HEAD_BRANCH:-master}"
          branch=$(echo "$raw_branch" | head -c 40 | sed 's/[\/_\.]/-/g; s/[^a-zA-Z0-9-]/-/g' | sed 's/^-*//; s/-*$//')
          if [ -z "$branch" ]; then
            branch="master"
          fi

          if [ -z "$projectName" ]; then
            echo "CLOUDFLARE_PROJECT_NAME is not set. Aborting deploy."
            exit 1
          fi

          LOG_FILE=".github/wrangler-pages-deploy.log"
          mkdir -p "$(dirname "$LOG_FILE")"
          echo "Starting wrangler pages deploy for project: $projectName (directory: $directory, branch: $branch)" > "$LOG_FILE"

          # Run deploy and capture output
          if wrangler pages deploy "$directory" --project-name="$projectName" --branch="$branch" >> "$LOG_FILE" 2>&1; then
            echo "Wrangler deploy finished. Inspecting logs for success..."
          else
            echo "Wrangler command failed. See $LOG_FILE for details."
            cat "$LOG_FILE"
            exit 1
          fi

          # Extract preview URL from wrangler output or fallback to predictable pages.dev URL
          PREVIEW_URL=$(grep -Eo 'https?://[a-zA-Z0-9._-]+\\.pages\\.dev' "$LOG_FILE" | head -n 1 || true)
          if [ -z "$PREVIEW_URL" ]; then
            PREVIEW_URL="https://$branch.$projectName.pages.dev"
          fi

          echo "preview_url=$PREVIEW_URL" >> "$GITHUB_OUTPUT"
          echo "Wrangler deploy log:"
          cat "$LOG_FILE"

      - name: Smoke test deployed preview (optional, will fail job if site unhealthy)
        if: always() && steps.publish-to-pages.outputs.preview_url != ''
        run: |
          set -euo pipefail
          PREVIEW_URL="${{ steps.publish-to-pages.outputs.preview_url }}"
          echo "Running smoke test against $PREVIEW_URL"
          # Try up to 3 times with small backoff
          attempts=0
          max_attempts=3
          until [ $attempts -ge $max_attempts ]
          do
            status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$PREVIEW_URL" || echo "000")
            echo "Attempt $((attempts+1)): HTTP $status"
            if [ "$status" -ge 200 ] && [ "$status" -lt 400 ]; then
              echo "Smoke test passed (HTTP $status)"
              exit 0
            fi
            attempts=$((attempts+1))
            sleep $((attempts * 2))
          done
          echo "Smoke test failed for $PREVIEW_URL"
          exit 1
        shell: bash

      - name: Upload Wrangler deploy log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wrangler-deploy-log
          path: .github/wrangler-pages-deploy.log
          retention-days: 7

      - name: Upload to Vercel (staging preview)
        uses: 'deriv-com/shared-actions/.github/actions/vercel_DR_publish@master'
        with:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_API_TOKEN }}
          ENVIRONMENT: Preview
          VERCEL_SCOPE: deriv
          ALIAS_DOMAIN_URL: 'staging-dbot-dr.binary.sx'
