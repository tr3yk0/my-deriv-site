name: Build test link and Deploy to Cloudflare Pages

permissions:
  actions: write
  checks: write
  pull-requests: write
  contents: read

on:
  pull_request_target:
    types: [opened, synchronize]
    branches:
      - '**'

concurrency:
  group: cloudflare-pages-build-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  build_to_cloudflare_pages:
    name: Build and deploy test preview (Cloudflare Pages)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: staging

    outputs:
      preview_url: ${{ steps.publish-to-pages.outputs.preview_url }}

    steps:
      - name: Verify user
        uses: 'deriv-com/shared-actions/.github/actions/verify_user_in_organization@v3'
        with:
          username: ${{ github.event.pull_request.user.login }}
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - name: Checkout PR commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Use Node.js 20
        uses: actions/setup-node@v3
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Restore node_modules cache
        id: cache-npm
        uses: actions/cache@v4
        with:
          path: node_modules
          key: npm-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: Install dependencies
        if: ${{ steps.cache-npm.outputs.cache-hit != 'true' }}
        run: npm ci
        shell: bash

      - name: Build staging (PR)
        run: npm run build
        env:
          APP_ENV: staging
          R2_PROJECT_NAME: ${{ vars.R2_PROJECT_NAME }}
          TRANSLATIONS_CDN_URL: ${{ vars.TRANSLATIONS_CDN_URL }}
          CROWDIN_BRANCH_NAME: staging
          IS_GROWTHBOOK_ENABLED: ${{ vars.IS_GROWTHBOOK_ENABLED }}
          RUDDERSTACK_KEY: ${{ vars.RUDDERSTACK_KEY }}
          REMOTE_CONFIG_URL: ${{ vars.REMOTE_CONFIG_URL }}
          GROWTHBOOK_CLIENT_KEY: ${{ vars.GROWTHBOOK_CLIENT_KEY }}
          GROWTHBOOK_DECRYPTION_KEY: ${{ vars.GROWTHBOOK_DECRYPTION_KEY }}
          GD_API_KEY: ${{ secrets.GD_API_KEY }}
          GD_APP_ID: ${{ secrets.GD_APP_ID }}
          GD_CLIENT_ID: ${{ secrets.GD_CLIENT_ID }}

      - name: Run ESLint
        run: npm run test:lint

      - name: Run unit tests and coverage
        run: npm run test

      - name: Retrieve PR metadata
        id: pr-meta
        run: |
          mkdir -p .pr
          echo "${{ github.event.number }}" > .pr/NR
          echo "${{ github.event.pull_request.user.login }}" > .pr/USERNAME
          echo "${{ github.head_ref }}" > .pr/BRANCHNAME
          echo "${{ github.event.pull_request.draft }}" > .pr/DRAFT

      - name: Generate action link comment
        id: generate_action_url
        uses: actions/github-script@ffc2c79a5b2490bd33e0a41c1de74b877714d736
        with:
          github-token: ${{ github.token }}
          script: |
            const action_url = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            const comment = [
              '| Name | Result |',
              '| :--- | :------ |',
              `| **Build status**  | Building 🔨 |`,
              `| **Action URL**  | [Visit Action](${action_url}) |`,
              ''
            ].join('\n');
            core.setOutput('comment', comment);

      - name: Post initial action comment
        uses: marocchino/sticky-pull-request-comment@efaaab3fd41a9c3de579aba759d2552635e590fd
        with:
          header: Cloudflare Pages Preview Comment
          number: ${{ github.event.number }}
          message: ${{ steps.generate_action_url.outputs.comment }}
          recreate: true

      - name: Install Wrangler CLI
        run: |
          echo "Installing Wrangler CLI"
          npm i -g wrangler@3
        shell: bash

      - name: Publish to Cloudflare Pages (test link)
        id: publish-to-pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_TEST_LINK_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_TEST_LINK_ACCOUNT_ID }}
          CLOUDFLARE_PROJECT_NAME: ${{ vars.CLOUDFLARE_TEST_LINK_PROJECT_NAME }}
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          set -euo pipefail

          echo "Deploying build to Cloudflare Pages (wrangler pages deploy)"
          directory='dist/'
          projectName="${CLOUDFLARE_PROJECT_NAME:-}"
          raw_branch="${HEAD_BRANCH:-pr-preview}"
          # sanitize branch for pages
          branch=$(echo "$raw_branch" | head -c 40 | sed 's/[\/_\.]/-/g; s/[^a-zA-Z0-9-]/-/g' | sed 's/^-*//; s/-*$//')
          if [ -z "$branch" ]; then
            branch="pr-preview"
          fi

          if [ -z "$projectName" ]; then
            echo "CLOUDFLARE_TEST_LINK_PROJECT_NAME is not set. Aborting deploy."
            exit 1
          fi

          LOG_FILE=".github/wrangler-pages-deploy.log"
          mkdir -p "$(dirname "$LOG_FILE")"
          echo "Starting wrangler pages deploy for project: $projectName (directory: $directory, branch: $branch)" > "$LOG_FILE"

          if wrangler pages deploy "$directory" --project-name="$projectName" --branch="$branch" >> "$LOG_FILE" 2>&1; then
            echo "Wrangler deploy finished. Inspecting logs for success..."
          else
            echo "Wrangler command failed. See $LOG_FILE for details."
            cat "$LOG_FILE"
            exit 1
          fi

          PREVIEW_URL=$(grep -Eo 'https?://[a-zA-Z0-9._-]+\\.pages\\.dev' "$LOG_FILE" | head -n 1 || true)
          if [ -z "$PREVIEW_URL" ]; then
            # Fallback to predictable pages.dev URL pattern for test links
            PREVIEW_URL="https://$branch.$projectName.pages.dev"
          fi

          echo "preview_url=$PREVIEW_URL" >> "$GITHUB_OUTPUT"
          echo "$PREVIEW_URL" > .pr/PREVIEW_URL
          echo "Wrangler deploy log:"
          cat "$LOG_FILE"

      - name: Generate preview link comment
        if: success()
        id: generate_preview_url
        uses: actions/github-script@ffc2c79a5b2490bd33e0a41c1de74b877714d736
        with:
          github-token: ${{ github.token }}
          script: |
            const action_url = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            const preview_url = `${process.env.PREVIEW_URL || '${{ steps.publish-to-pages.outputs.preview_url }}'}`;
            const comment = [
              `**Preview Link**: ${preview_url}`,
              '| Name | Result |',
              '| :--- | :------ |',
              `| **Build status**  | Completed ✅ |`,
              `| **Preview URL**  | [Visit Preview](${preview_url}) |`,
              `| **Action URL**  | [Visit Action](${action_url}) |`,
              ''
            ].join('\n');
            core.setOutput('comment', comment);

      - name: Generate failure comment
        if: failure()
        id: generate_failure_comment
        uses: actions/github-script@ffc2c79a5b2490bd33e0a41c1de74b877714d736
        with:
          github-token: ${{ github.token }}
          script: |
            const action_url = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            const comment = [
              '| Name | Result |',
              '| :--- | :------ |',
              `| **Build status**  | Failed ❌ |`,
              `| **Action URL**  | [Visit Action](${action_url}) |`,
              ''
            ].join('\n');
            core.setOutput('comment', comment);

      - name: Post Cloudflare Pages Preview comment
        if: success() || failure()
        uses: marocchino/sticky-pull-request-comment@efaaab3fd41a9c3de579aba759d2552635e590fd
        with:
          header: Cloudflare Pages Preview Comment
          number: ${{ github.event.number }}
          message: ${{ steps.generate_preview_url.outputs.comment || steps.generate_failure_comment.outputs.comment }}
          recreate: true

      - name: Archive PR metadata and preview URL
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-${{ github.run_id }}
          path: .pr
          retention-days: 7

      - name: Upload wrangler deploy log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wrangler-deploy-log-${{ github.run_id }}
          path: .github/wrangler-pages-deploy.log
          retention-days: 7
