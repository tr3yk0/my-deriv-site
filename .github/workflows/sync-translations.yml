name: Sync translations

on:
  push:
    branches:
      - master
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

concurrency:
  group: sync-translations
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  sync_translations:
    name: Sync translations (staging)
    runs-on: ubuntu-latest
    environment: staging
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js 20
        uses: actions/setup-node@v3
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Restore node_modules cache
        id: cache-npm
        uses: actions/cache@v4
        with:
          path: node_modules
          key: npm-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: Install dependencies (if needed)
        if: ${{ steps.cache-npm.outputs.cache-hit != 'true' }}
        run: npm ci
        shell: bash

      - name: Sync Bots translations (staging)
        id: sync-staging
        uses: deriv-com/translations/.github/actions/extract_and_sync_translations@master
        with:
          PROJECT_NAME: ${{ vars.R2_PROJECT_NAME }}
          CROWDIN_BRANCH_NAME: staging
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          PROJECT_SOURCE_DIRECTORY: "src"

      - name: Upload sync log artifact (staging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: translations-sync-staging-${{ github.run_id }}
          path: |
            ./**/crowdin-*.log
            ./**/translations-*.log
          retention-days: 7

  sync_translations_production:
    name: Sync translations (production)
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js 20
        uses: actions/setup-node@v3
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Restore node_modules cache
        id: cache-npm-prod
        uses: actions/cache@v4
        with:
          path: node_modules
          key: npm-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: Install dependencies (if needed)
        if: ${{ steps.cache-npm-prod.outputs.cache-hit != 'true' }}
        run: npm ci
        shell: bash

      - name: Sync Bots translations (production)
        id: sync-production
        uses: deriv-com/translations/.github/actions/extract_and_sync_translations@master
        with:
          PROJECT_NAME: ${{ vars.R2_PROJECT_NAME }}
          CROWDIN_BRANCH_NAME: production
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          PROJECT_SOURCE_DIRECTORY: "src"

      - name: Upload sync log artifact (production)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: translations-sync-production-${{ github.run_id }}
          path: |
            ./**/crowdin-*.log
            ./**/translations-*.log
          retention-days: 7
