    <!-- Canonical -->
    <link rel="canonical" href="/" />

    <!-- Favicon and preloads -->

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Deriv Bot" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Security hint: Content Security Policy (report-only recommended first) -->
    <!--
      Note: CSP below is a conservative starter. Adjust sources to match your actual CDNs and inline needs.
      Use report-only mode in production to tune before enforcing.
    -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src 'self' https:; img-src 'self' data: https:; script-src 'self' https://cdn.livechatinc.com 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https:; font-src 'self' https: data:;">

    <!-- Accessibility and performance -->
    <meta name="color-scheme" content="light dark" />
    <meta name="referrer" content="no-referrer-when-downgrade" />

    <style>
        :root {
            font-size: 62.5%;
            --brand-color: #ff444f;
            --bg: #ffffff;
            --text: #111827;
        }

        html, body {
            height: 100%;
            margin: 0;
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Minimal visually-hidden helper for accessibility */
        .sr-only {
            position: absolute !important;
            width: 1px; height: 1px;
            padding: 0; margin: -1px;
            overflow: hidden; clip: rect(0,0,0,0);
            white-space: nowrap; border: 0;
        }

        /* Offline indicator */
        #network-status {
            position: fixed;
            left: 1rem;
            bottom: 1rem;
            background: rgba(0,0,0,0.75);
            color: #fff;
            padding: 0.6rem 0.9rem;
            border-radius: 6px;
            font-size: 1.2rem;
            display: none;
            z-index: 9999;
        }
        #network-status[data-online="false"] { display: block; background: #b91c1c; }
        #network-status[data-online="true"] { display: block; background: #059669; }
    </style>
</head>

<body class="body theme theme--light">
    <div id="modal_root" class="modal-root" aria-hidden="true"></div>
    <div id="popup_root" class="popup-root" aria-hidden="true"></div>
    <div id="root" role="main" aria-live="polite"></div>

    <noscript>
        <div style="padding:1rem;background:#fff3cd;color:#856404;border-radius:6px;margin:1rem;">
            JavaScript is required for the full experience. Please enable JavaScript in your browser.
        </div>
    </noscript>

    <div id="network-status" aria-hidden="true" data-online="true">Online</div>

    <!-- LiveChat loader (deferred, non-blocking, safe) -->
    <script type="text/javascript">
        (function (w, d) {
            // Defer loading external chat script to avoid blocking initial render.
            // Load after DOMContentLoaded and a short idle timeout.
            function loadLiveChat() {
                try {
                    if (!w.__lc) w.__lc = {};
                    w.__lc.license = w.__lc.license || 12049137;
                    w.__lc.asyncInit = true;

                    // Lightweight API shim to queue calls until the widget loads
                    if (!w.LiveChatWidget) {
                        var q = [];
                        var api = {
                            _q: q,
                            _h: null,
                            _v: '2.0',
                            on: function () { q.push(['on', Array.prototype.slice.call(arguments)]); },
                            once: function () { q.push(['once', Array.prototype.slice.call(arguments)]); },
                            off: function () { q.push(['off', Array.prototype.slice.call(arguments)]); },
                            get: function () { q.push(['get', Array.prototype.slice.call(arguments)]); },
                            call: function () { q.push(['call', Array.prototype.slice.call(arguments)]); },
                            init: function () {
                                // load remote script asynchronously
                                var s = d.createElement('script');
                                s.async = true;
                                s.type = 'text/javascript';
                                s.src = 'https://cdn.livechatinc.com/tracking.js';
                                s.crossOrigin = 'anonymous';
                                s.onload = function () { /* optional hook */ };
                                s.onerror = function () { console.warn('LiveChat failed to load'); };
                                d.head.appendChild(s);
                            }
                        };
                        w.LiveChatWidget = api;
                    }

                    // Use requestIdleCallback when available to avoid jank
                    var schedule = w.requestIdleCallback || function (fn) { return setTimeout(fn, 1500); };
                    schedule(function () {
                        try {
                            w.LiveChatWidget.init();
                        } catch (e) {
                            // Fail silently; chat is non-critical
                            console.warn('LiveChat init error', e);
                        }
                    });
                } catch (err) {
                    console.warn('LiveChat loader error', err);
                }
            }

            if (d.readyState === 'complete' || d.readyState === 'interactive') {
                loadLiveChat();
            } else {
                d.addEventListener('DOMContentLoaded', loadLiveChat, { once: true });
            }
        })(window, document);
    </script>

    <!-- Service Worker registration with feature detection and safe guards -->
    <script type="text/javascript">
        (function () {
            // Only register service worker on secure contexts and supported browsers
            if (!('serviceWorker' in navigator) || location.protocol !== 'https:') {
                // Do not attempt registration in insecure contexts
                return;
            }

            // Skip registration for known problematic browsers
            var ua = navigator.userAgent || '';
            var isFirefox = /firefox/i.test(ua);
            var isSafari = /safari/i.test(ua) && !/chrome/i.test(ua);
            var shouldSkip = isFirefox || isSafari;

            if (shouldSkip) {
                // Do not unregister blindly; only unregister if scope matches this origin and if a problematic SW exists
                navigator.serviceWorker.getRegistrations().then(function (regs) {
                    regs.forEach(function (reg) {
                        try {
                            // Only unregister if the registration scope is same-origin and not our expected scope
                            if (reg.scope && reg.scope.indexOf(location.origin) === 0) {
                                // If you have a known-good scope, compare and skip unregistering it
                                // reg.unregister();
                                console.info('[SW] Skipping registration for this browser to avoid chunk loading issues', reg.scope);
                            }
                        } catch (e) {
                            console.warn('[SW] Error while checking registrations', e);
                        }
                    });
                }).catch(function (err) {
                    console.warn('[SW] Failed to inspect registrations', err);
                });
                return;
            }

            // Register service worker with a safe try/catch and timeout
            var swUrl = '/service-worker.js';
            var registrationTimeout = 8000;

            var didRegister = false;
            var timer = setTimeout(function () {
                if (!didRegister) {
                    console.warn('[SW] Registration timed out');
                }
            }, registrationTimeout);

            navigator.serviceWorker.register(swUrl).then(function (reg) {
                didRegister = true;
                clearTimeout(timer);
                console.info('[SW] Registered with scope', reg.scope);
                // Optional: listen for updates
                reg.addEventListener('updatefound', function () {
                    var installing = reg.installing;
                    if (installing) {
                        installing.addEventListener('statechange', function () {
                            console.info('[SW] state:', installing.state);
                        });
                    }
                });
            }).catch(function (err) {
                clearTimeout(timer);
                console.warn('[SW] Registration failed', err);
            });

            // Listen for messages from SW
            navigator.serviceWorker && navigator.serviceWorker.addEventListener && navigator.serviceWorker.addEventListener('message', function (event) {
                try {
                    console.info('[SW] Message:', event.data);
                } catch (e) {
                    // ignore
                }
            });
        })();
    </script>

    <!-- Network status UI and handlers -->
    <script type="text/javascript">
        (function () {
            var statusEl = document.getElementById('network-status');
            function updateStatus() {
                var online = navigator.onLine;
                statusEl.setAttribute('data-online', online ? 'true' : 'false');
                statusEl.textContent = online ? 'Online' : 'Offline';
                statusEl.setAttribute('aria-hidden', online ? 'true' : 'false');
            }
            window.addEventListener('online', updateStatus);
            window.addEventListener('offline', updateStatus);
            // Initialize
            updateStatus();
        })();
    </script>
</body>
</html>
