 <!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Martingale Calculator</title>

  <!-- Preload CSS for faster rendering -->
  <link rel="preload" href="risk-calculator.css" as="style" />
  <link rel="stylesheet" href="risk-calculator.css" />

  <!-- Progressive Web App support -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0d6efd" />
</head>
<body>
  <main class="calculator-container">
    <header>
      <h1>Risk Calculator</h1>
    </header>

    <section class="input-group">
      <label for="capital">Initial Capital (₹):</label>
      <input type="number"
             id="capital"
             min="0"
             step="0.01"
             placeholder="Enter capital"
             required
             aria-describedby="capitalHelp" />
      <small id="capitalHelp">Enter your starting balance to calculate stake, profit, and stop loss.</small>
    </section>

    <section class="results" aria-live="polite">
      <div class="result-item">
        <span>Stake (2% of Capital):</span>
        <strong id="stake">0.00</strong>
      </div>
      <div class="result-item">
        <span>Take Profit (5× Stake):</span>
        <strong id="takeProfit">0.00</strong>
      </div>
      <div class="result-item">
        <span>Stop Loss (4 Losses Sum):</span>
        <strong id="stopLoss">0.00</strong>
      </div>
    </section>
  </main>

  <!-- Load script at end for performance -->
  <script src="risk-calculator.js" defer></script>
</body>
</html>
